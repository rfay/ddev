#ddev-generated
name: complex-php-test
image: ddev/ddev-webserver:latest

yaml_read_files:
  test_config: "test-config.yaml"

pre_install_actions:
  - |
    <?php
    #ddev-description: Complex PHP addon with config transformation
    
    // Read project config from mounted .ddev directory
    $configPath = '/mnt/ddev_config/config.yaml';
    $projectName = 'unknown';
    $projectType = 'unknown';
    
    if (file_exists($configPath)) {
        $configContent = file_get_contents($configPath);
        if (preg_match('/^name:\s*(.+)$/m', $configContent, $matches)) {
            $projectName = trim($matches[1]);
        }
        if (preg_match('/^type:\s*(.+)$/m', $configContent, $matches)) {
            $projectType = trim($matches[1]);
        }
    }
    
    echo "PHP: Processing complex addon for $projectName ($projectType)\n";
    
    // Test yaml_read_files functionality - read test-config.yaml directly
    $testConfigPath = '/mnt/ddev_config/test-config.yaml';
    if (file_exists($testConfigPath)) {
        $testConfigContent = file_get_contents($testConfigPath);
        
        // Simple YAML parsing for database version
        if (preg_match('/database:\s*\n\s*version:\s*["\']?([^"\'\n]+)["\']?/m', $testConfigContent, $matches)) {
            $dbVersion = trim($matches[1]);
            echo "PHP: Database version from config: $dbVersion\n";
        }
        
        // Parse services
        if (preg_match('/services:\s*\n((?:\s+\w+:[^\n]*\n?)*)/m', $testConfigContent, $matches)) {
            preg_match_all('/^\s+(\w+):/m', $matches[1], $serviceMatches);
            foreach ($serviceMatches[1] as $service) {
                echo "PHP: Service $service configured\n";
            }
        }
    }
    
    // Generate a docker-compose snippet based on config
    $yamlContent = "#ddev-generated\n";
    $yamlContent .= "services:\n";
    $yamlContent .= "  complex-php-addon:\n";
    $yamlContent .= "    image: ddev/ddev-utilities\n";
    $yamlContent .= "    environment:\n";
    $yamlContent .= "      PROJECT_NAME: \"$projectName\"\n";
    $yamlContent .= "      PROJECT_TYPE: \"$projectType\"\n";
    
    file_put_contents('/mnt/ddev_config/docker-compose.complex-php-addon.yaml', $yamlContent);
    
    echo "PHP: Generated docker-compose.complex-php-addon.yaml\n";
    ?>

project_files:
  - docker-compose.complex-php-addon.yaml